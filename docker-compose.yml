version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: cardioguard-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cardioguard
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - cardioguard-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: cardioguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - cardioguard-network

  # InfluxDB时序数据库
  influxdb:
    image: influxdb:2.7
    container_name: cardioguard-influxdb
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin123
      DOCKER_INFLUXDB_INIT_ORG: cardioguard
      DOCKER_INFLUXDB_INIT_BUCKET: health-data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    networks:
      - cardioguard-network

  # CardioGuard后端应用
  backend:
    build:
      context: ./cardio-guard-backend
      dockerfile: Dockerfile
    container_name: cardioguard-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cardioguard?useUnicode=true&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: my-token
    depends_on:
      - mysql
      - redis
      - influxdb
    volumes:
      - backend-logs:/app/logs
    networks:
      - cardioguard-network

volumes:
  mysql-data:
  redis-data:
  influxdb-data:
  backend-logs:

networks:
  cardioguard-network:
    driver: bridge
